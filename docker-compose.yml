x-app-env: &app-env
  APP_NAME: Resumind
  APP_ENV: production
  APP_DEBUG: "false"
  APP_URL: ${APP_URL:-http://localhost:8085}
  ASSET_URL: ${APP_URL:-http://localhost:8085}
  APP_KEY: ${APP_KEY}
  DB_CONNECTION: mysql
  DB_HOST: db
  DB_PORT: 3306
  DB_DATABASE: resumind
  DB_USERNAME: resumind
  DB_PASSWORD: ${DB_PASSWORD:-secret}
  QUEUE_CONNECTION: redis
  REDIS_CLIENT: phpredis
  REDIS_HOST: redis
  REDIS_PORT: 6379
  SESSION_DRIVER: database
  CACHE_STORE: database
  LOG_CHANNEL: stderr
  OLLAMA_LLM_URL: ${OLLAMA_LLM_URL:-http://192.168.50.46:11434}
  OLLAMA_LLM_MODEL: ${OLLAMA_LLM_MODEL:-qwen3:8b}

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resumind_app
    restart: unless-stopped
    environment:
      <<: *app-env
    volumes:
      - ./data/storage:/var/www/storage
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - db
      - redis
    networks:
      - resumind

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resumind_queue
    restart: unless-stopped
    environment:
      <<: *app-env
      CONTAINER_ROLE: queue
    volumes:
      - ./data/storage:/var/www/storage
    depends_on:
      - app
      - redis
    networks:
      - resumind

  redis:
    image: redis:7-alpine
    container_name: resumind_redis
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    networks:
      - resumind

  db:
    image: mysql:8.4
    container_name: resumind_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: resumind
      MYSQL_USER: resumind
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - ./data/mysql:/var/lib/mysql
    ports:
      - "${DB_PORT:-3306}:3306"
    networks:
      - resumind

networks:
  resumind:
    driver: bridge
