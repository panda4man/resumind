services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resumind_app
    restart: unless-stopped
    environment:
      APP_NAME: Resumind
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:8085}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: resumind
      DB_USERNAME: resumind
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      CACHE_STORE: database
      LOG_CHANNEL: stderr
    volumes:
      - ./data/storage:/var/www/storage
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      - db
    networks:
      - resumind

  db:
    image: mysql:8.4
    container_name: resumind_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: resumind
      MYSQL_USER: resumind
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - ./data/mysql:/var/lib/mysql
    ports:
      - "${DB_PORT:-3306}:3306"
    networks:
      - resumind

networks:
  resumind:
    driver: bridge
